x-reranker: &reranker_template
  user: "${PUID:-1000}:${PGID:-1000}"
  networks:
    default:
      aliases:
        - reranker
  environment:
    # Run unprivileged: keep HOME and the HF cache on the writable mounted
    # volume so infinity never needs to write under root-owned /root.
    HOME: /cache
    HF_HOME: /cache/huggingface
  volumes:
    # This file is `include`d, so a relative default resolves relative to
    # extern/reranker/. ../../ points back at the project root so the cache
    # matches vllm's and the dir init-perms chowns.
    - ${VLLM_CACHE:-../../.cache/huggingface}:/cache # Model weights for RAG (HOME=/cache)
  depends_on:
    init-perms:
      condition: service_completed_successfully
  # ports:
  #   - ${RERANKER_PORT:-7997}:7997

services:
  reranker:
    <<: *reranker_template
    image: michaelf34/infinity
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all 
              capabilities: [gpu]
    command: >
      v2
      --model-id ${RERANKER_MODEL:-Alibaba-NLP/gte-multilingual-reranker-base}
      --api-key ${RERANKER_API_KEY:-"EMPTY"}
      --port 7997
    profiles:
      - ''

  reranker-cpu:
    <<: *reranker_template
    image: michaelf34/infinity:latest-cpu
    deploy: {}
    command: >
      v2
      --engine torch
      --model-id ${RERANKER_MODEL:-Alibaba-NLP/gte-multilingual-reranker-base}
      --api-key ${RERANKER_API_KEY:-"EMPTY"}
      --port 7997
    profiles:
      - 'cpu'

