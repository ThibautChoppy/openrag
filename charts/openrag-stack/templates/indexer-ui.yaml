{{- if .Values.indexerUi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openrag-stack.fullname" . }}-indexer-ui
  labels:
    app.kubernetes.io/name: indexer-ui
    app.kubernetes.io/instance: {{ include "openrag-stack.fullname" . }}
spec:
  replicas: {{ .Values.indexerUi.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: indexer-ui
      app.kubernetes.io/instance: {{ include "openrag-stack.fullname" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: indexer-ui
        app.kubernetes.io/instance: {{ include "openrag-stack.fullname" . }}
    spec:
      {{- with .Values.indexerUi.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.indexerUi.serviceAccountName }}
      serviceAccountName: {{ . }}
      {{- end }}
      containers:
        - name: indexer-ui
          image: {{ .Values.indexerUi.image }}
          imagePullPolicy: {{ .Values.indexerUi.imagePullPolicy }}
          {{- with .Values.indexerUi.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- range $key, $value := .Values.indexerUi.env }}
            - name: {{ $key }}
              value: {{ tpl $value $ | quote }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.indexerUi.service.targetPort }}
          resources:
            {{- toYaml .Values.indexerUi.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openrag-stack.fullname" . }}-indexer-ui
  labels:
    app.kubernetes.io/name: indexer-ui
    app.kubernetes.io/instance: {{ include "openrag-stack.fullname" . }}
spec:
  type: {{ .Values.indexerUi.service.type }}
  ports:
    - port: {{ .Values.indexerUi.service.port }}
      targetPort: {{ .Values.indexerUi.service.targetPort }}
      {{- if eq .Values.indexerUi.service.type "NodePort" }}
      nodePort: {{ .Values.indexerUi.service.nodePort }}
      {{- end }}
  selector:
    app.kubernetes.io/name: indexer-ui
    app.kubernetes.io/instance: {{ include "openrag-stack.fullname" . }}
{{- if .Values.indexerUi.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "openrag-stack.fullname" . }}-indexer-ui
  {{- with .Values.indexerUi.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.indexerUi.ingress.className }}
  ingressClassName: {{ .Values.indexerUi.ingress.className | quote }}
  {{- end }}
  rules:
    - http:
        paths:
          - path: {{ .Values.indexerUi.ingress.path }}
            pathType: {{ .Values.indexerUi.ingress.pathType }}
            backend:
              service:
                name: {{ .Release.Name }}-indexer-ui
                port:
                  number: {{ .Values.indexerUi.service.port }}
      {{- with .Values.indexerUi.ingress.host }}
      host: {{ . | quote }}
      {{- end }}
  {{- with .Values.indexerUi.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
