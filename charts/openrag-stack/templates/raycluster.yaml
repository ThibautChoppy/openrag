{{- if .Values.ray.enabled }}
apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: {{ .Release.Name }}-raycluster
  annotations:
    ray.io/overwrite-container-cmd: "true"
spec:
  rayVersion: "2.47.1"
  enableInTreeAutoscaling: false
  headGroupSpec:
    serviceType: ClusterIP
    template:
      spec:
        nodeSelector: {{- toYaml .Values.ray.nodeSelector | nindent 12 }}
        initContainers:
          - name: init-venv-sync
            image: {{ .Values.ray.image.repository }}:{{ .Values.ray.image.tag }}
            command:
              - sh
              - -c
              - |
                if [ -f /app/.venv/.ready ]; then
                  echo "Existing env detected, skipping install."
                else
                  echo "No env ready, cleaning and syncing..."
                  rm -rf /app/.venv/*
                  uv sync
                  touch /app/.venv/.ready
                fi
            volumeMounts:
              - name: venv
                mountPath: /app/.venv

        containers:
          - name: ray-head
            image: {{ .Values.ray.image.repository }}:{{ .Values.ray.image.tag }}
            command: ["uv"]
            args:
              - "run"
              - "ray"
              - "start"
              - "--head"
              - "--dashboard-host=0.0.0.0"
              - "--dashboard-agent-listen-port=52365"
              - "--metrics-export-port=8080"
              - "--block"
            ports:
              - containerPort: 80
                name: serve
              - containerPort: 8265
                name: dashboard
              - containerPort: 10001
                name: client
              - containerPort: 6379
                name: gcs
              - containerPort: 8080
                name: metrics
            volumeMounts:
              - name: model-weights
                mountPath: /app/model_weights
              - name: data
                mountPath: /app/data
              - name: logs
                mountPath: /app/logs
              - name: venv
                mountPath: /app/.venv
            envFrom:
              - configMapRef:
                  name: {{ $.Release.Name }}-env
              - secretRef:
                  name: {{ include "openrag-stack.secretName" . }}
            resources:
              requests:
                cpu: {{ .Values.ray.resources.head.requests.cpu | quote }}
                memory: {{ .Values.ray.resources.head.requests.memory | quote }}
                nvidia.com/gpu: 1
              limits:
                nvidia.com/gpu: 1
        volumes:
          - name: model-weights
            persistentVolumeClaim:
              claimName: {{ .Release.Name }}-model-weights
          - name: data
            persistentVolumeClaim:
              claimName: {{ .Release.Name }}-data
          - name: logs
            persistentVolumeClaim:
              claimName: {{ .Release.Name }}-logs
          - name: venv
            persistentVolumeClaim:
              claimName: {{ .Release.Name }}-venv

  workerGroupSpecs:
  {{- range $i, $e := until (.Values.ray.workers.count | int) }}
    - groupName: worker-group-{{ add $i 1 }}
      replicas: {{ $.Values.ray.workers.replicas }}
      minReplicas: {{ $.Values.ray.workers.minReplicas }}
      maxReplicas: {{ $.Values.ray.workers.maxReplicas }}
      template:
        spec:
          nodeSelector: {{- toYaml $.Values.ray.nodeSelector | nindent 12 }}
          initContainers:
            - name: init-venv
              image: {{ $.Values.ray.image.repository }}:{{ $.Values.ray.image.tag }}
              command:
                - sh
                - -c
                - |
                  echo "Waiting for Python env in /app/.venv..."
                  while [ ! -f /app/.venv/.ready ]; do
                    sleep 3
                  done
                  echo "Venv is ready."
              volumeMounts:
                - name: venv
                  mountPath: /app/.venv
          containers:
            - name: ray-worker
              image: {{ $.Values.ray.image.repository }}:{{ $.Values.ray.image.tag }}
              command: ["/bin/bash", "-lc", "--"]
              args:
                - uv run $KUBERAY_GEN_RAY_START_CMD
              volumeMounts:
                - name: model-weights
                  mountPath: /app/model_weights
                - name: data
                  mountPath: /app/data
                - name: logs
                  mountPath: /app/logs
                - name: venv
                  mountPath: /app/.venv
              envFrom:
                - configMapRef:
                    name: {{ $.Release.Name }}-env
                - secretRef:
                    name: {{ include "openrag-stack.secretName" $ }}
              resources:
                requests:
                  cpu: {{ $.Values.ray.resources.worker.requests.cpu | quote }}
                  memory: {{ $.Values.ray.resources.worker.requests.memory | quote }}
                  nvidia.com/gpu: 1
                limits:
                  nvidia.com/gpu: 1
          volumes:
            - name: model-weights
              persistentVolumeClaim:
                claimName: {{ $.Release.Name }}-model-weights
            - name: data
              persistentVolumeClaim:
                claimName: {{ $.Release.Name }}-data
            - name: logs
              persistentVolumeClaim:
                claimName: {{ $.Release.Name }}-logs
            - name: venv
              persistentVolumeClaim:
                claimName: {{ $.Release.Name }}-venv
  {{- end }}
{{- end }}
