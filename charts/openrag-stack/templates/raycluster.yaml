{{- if .Values.ray.enabled }}
apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: {{ include "openrag-stack.fullname" . }}-raycluster
  {{- with .Values.ray.annotations }}
  annotations:
    {{- . | toYaml | nindent 4 }}
  {{- end }}
spec:
  rayVersion: {{ .Values.ray.rayVersion }}
  enableInTreeAutoscaling: {{ .Values.ray.enableInTreeAutoscaling }}
  headGroupSpec:
    serviceType: ClusterIP
    template:
      spec:
        {{- with .Values.ray.nodeSelector }}
        nodeSelector: {{- toYaml . | nindent 12 }}
        {{- end }}
        {{- with .Values.ray.serviceAccountName }}
        serviceAccountName: {{ . }}
        {{- end }}
        {{- with .Values.ray.podSecurityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        containers:
          - name: ray-head
            image: "{{ .Values.ray.image.registry | default .Values.global.image.registry }}/{{ .Values.ray.image.repository }}:{{ .Values.ray.image.tag }}"
            command: ["uv"]
            args:
              - "run"
              - "ray"
              - "start"
              - "--head"
              - "--dashboard-host=0.0.0.0"
              - "--dashboard-agent-listen-port=52365"
              - "--metrics-export-port=8080"
              - "--block"
            ports:
              - containerPort: 80
                name: serve
              - containerPort: 8265
                name: dashboard
              - containerPort: 10001
                name: client
              - containerPort: 6379
                name: gcs
              - containerPort: 8080
                name: metrics
            volumeMounts:
              - name: model-weights
                mountPath: /app/model_weights
              - name: data
                mountPath: /app/data
              - name: logs
                mountPath: /app/logs
            envFrom:
              - configMapRef:
                  name: {{ include "openrag-stack.fullname" . }}-env
              - secretRef:
                  name: {{ include "openrag-stack.secretName" . }}
            {{- with .Values.ray.resources.head }}
            resources:
              {{- toYaml . | nindent 14 }}
            {{- end }}
        volumes:
          - name: model-weights
            persistentVolumeClaim:
              claimName: {{ include "openrag-stack.fullname" . }}-model-weights
          - name: data
            persistentVolumeClaim:
              claimName: {{ include "openrag-stack.fullname" . }}-data
          - name: logs
            persistentVolumeClaim:
              claimName: {{ include "openrag-stack.fullname" . }}-logs

  workerGroupSpecs:
  {{- range $i, $e := until (.Values.ray.workers.count | int) }}
    - groupName: worker-group-{{ add $i 1 }}
      replicas: {{ $.Values.ray.workers.replicas }}
      minReplicas: {{ $.Values.ray.workers.minReplicas }}
      maxReplicas: {{ $.Values.ray.workers.maxReplicas }}
      template:
        spec:
          nodeSelector: {{- toYaml $.Values.ray.nodeSelector | nindent 12 }}
          {{- with $.Values.ray.serviceAccountName }}
          serviceAccountName: {{ . }}
          {{- end }}
          {{- with $.Values.ray.podSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: ray-worker
              image: "{{ $.Values.ray.image.registry | default $.Values.global.image.registry }}/{{ $.Values.ray.image.repository }}:{{ $.Values.ray.image.tag }}"
              command: ["/bin/bash", "-lc", "--"]
              args:
                - uv run $KUBERAY_GEN_RAY_START_CMD
              volumeMounts:
                - name: model-weights
                  mountPath: /app/model_weights
                - name: data
                  mountPath: /app/data
                - name: logs
                  mountPath: /app/logs
              envFrom:
                - configMapRef:
                    name: {{ include "openrag-stack.fullname" $ }}-env
                - secretRef:
                    name: {{ include "openrag-stack.secretName" $ }}
              {{- with $.Values.ray.resources.worker }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
          volumes:
            - name: model-weights
              persistentVolumeClaim:
                claimName: {{ include "openrag-stack.fullname" . }}-model-weights
            - name: data
              persistentVolumeClaim:
                claimName: {{ include "openrag-stack.fullname" . }}-data
            - name: logs
              persistentVolumeClaim:
                claimName: {{ include "openrag-stack.fullname" . }}-logs
  {{- end }}
{{- if .Values.ray.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "openrag-stack.fullname" . }}-raycluster
  {{- with .Values.ray.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ray.ingress.className }}
  ingressClassName: {{ .Values.ray.ingress.className | quote }}
  {{- end }}
  rules:
    - http:
        paths:
          - path: {{ .Values.ray.ingress.path }}
            pathType: {{ .Values.ray.ingress.pathType }}
            backend:
              service:
                name: {{ include "openrag-stack.fullname" . }}-raycluster-head-svc
                port:
                  number: {{ .Values.env.config.RAY_DASHBOARD_PORT }}
      {{- with .Values.ray.ingress.host }}
      host: {{ . | quote }}
      {{- end }}
  {{- with .Values.ray.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
