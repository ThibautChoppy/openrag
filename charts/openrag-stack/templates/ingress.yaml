{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "openrag-stack.fullname" . }}-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"

spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    - http:
        paths:
          {{- if .Values.ingress.paths.openrag.enabled }}
          - path: /api(?:/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-openrag
                port:
                  number: {{ .Values.openrag.service.port }}
          {{- end }}
          - path: /(.*)
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-raycluster-head-svc
                port:
                  number: {{ .Values.env.config.RAY_SERVE_PORT }}
      {{- with .Values.ingress.host }}
      host: {{ . | quote }}
      {{- end }}
{{- end }}
