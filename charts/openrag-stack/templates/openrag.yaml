apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openrag-stack.fullname" . }}-openrag
  labels:
    app.kubernetes.io/name: openrag
    app.kubernetes.io/instance: {{ include "openrag-stack.fullname" . }}
spec:
  replicas: {{ .Values.openrag.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: openrag
      app.kubernetes.io/instance: {{ include "openrag-stack.fullname" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openrag
        app.kubernetes.io/instance: {{ include "openrag-stack.fullname" . }}
    spec:
      securityContext:
        {{- toYaml .Values.openrag.podSecurityContext | nindent 8 }}
      containers:
        - name: openrag
          image: "{{ .Values.openrag.image.registry | default .Values.global.image.registry }}/{{ .Values.openrag.image.repository }}:{{ .Values.openrag.image.tag }}"
          securityContext:
            {{- toYaml .Values.openrag.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.openrag.service.port }}
            {{- if .Values.openrag.rayDashboard.ingress.enabled }}
            - containerPort: 8265
              name: ray-dashboard
            {{- end }}
          resources:
            {{- toYaml .Values.openrag.resources | nindent 12 }}
          {{- if .Values.openrag.probes.startup }}
          startupProbe:
            {{- toYaml .Values.openrag.probes.startup | nindent 12 }}
          {{- end }}
          {{- if .Values.openrag.probes.readiness }}
          readinessProbe:
            {{- toYaml .Values.openrag.probes.readiness | nindent 12 }}
          {{- end }}
          {{- if .Values.openrag.probes.liveness }}
          livenessProbe:
            {{- toYaml .Values.openrag.probes.liveness | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "openrag-stack.fullname" . }}-env
            - secretRef:
                name: {{ include "openrag-stack.secretName" . }}
          volumeMounts:
            - name: model-weights
              mountPath: /app/model_weights
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
            - name: venv
              mountPath: /app/.venv
            # - name: egg-info
            #   mountPath: /app/openrag.egg-info
      volumes:
        - name: model-weights
          persistentVolumeClaim:
            claimName: {{ include "openrag-stack.fullname" . }}-model-weights
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "openrag-stack.fullname" . }}-data
        - name: logs
          persistentVolumeClaim:
            claimName: {{ include "openrag-stack.fullname" . }}-logs
        - name: venv
          persistentVolumeClaim:
            claimName: {{ include "openrag-stack.fullname" . }}-venv
        # - name: egg-info
        #   emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openrag-stack.fullname" . }}-openrag
  labels:
    app.kubernetes.io/name: openrag
    app.kubernetes.io/instance: {{ include "openrag-stack.fullname" . }}
spec:
  selector:
    app.kubernetes.io/name: openrag
    app.kubernetes.io/instance: {{ include "openrag-stack.fullname" . }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.openrag.service.port }}
      targetPort: {{ .Values.openrag.service.port }}
    {{- if .Values.openrag.rayDashboard.ingress.enabled }}
    - name: ray-dashboard
      protocol: TCP
      port: 8265
      targetPort: 8265
    {{- end }}
  type: {{ .Values.openrag.service.type }}
{{- if .Values.openrag.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "openrag-stack.fullname" . }}-openrag
  {{- with .Values.openrag.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.openrag.ingress.className }}
  ingressClassName: {{ .Values.openrag.ingress.className | quote }}
  {{- end }}
  rules:
    - http:
        paths:
          - path: {{ .Values.openrag.ingress.path }}
            pathType: {{ .Values.openrag.ingress.pathType }}
            backend:
              service:
                name: {{ include "openrag-stack.fullname" . }}-openrag
                port:
                  number: {{ .Values.openrag.service.port }}
      {{- with .Values.openrag.ingress.host }}
      host: {{ . | quote }}
      {{- end }}
  {{- with .Values.openrag.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if .Values.openrag.rayDashboard.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "openrag-stack.fullname" . }}-openrag-ray-dashboard
  {{- with .Values.openrag.rayDashboard.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.openrag.rayDashboard.ingress.className }}
  ingressClassName: {{ .Values.openrag.rayDashboard.ingress.className | quote }}
  {{- end }}
  rules:
    - http:
        paths:
          - path: {{ .Values.openrag.rayDashboard.ingress.path }}
            pathType: {{ .Values.openrag.rayDashboard.ingress.pathType }}
            backend:
              service:
                name: {{ include "openrag-stack.fullname" . }}-openrag
                port:
                  name: ray-dashboard
      {{- with .Values.openrag.rayDashboard.ingress.host }}
      host: {{ . | quote }}
      {{- end }}
  {{- with .Values.openrag.rayDashboard.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
