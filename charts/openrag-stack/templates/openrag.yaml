apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-openrag
  labels:
    app.kubernetes.io/name: openrag
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.openrag.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: openrag
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openrag
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- toYaml .Values.openrag.podSecurityContext | nindent 8 }}
      initContainers:
        - name: init-venv
          image: "{{ .Values.openrag.image.repository }}:{{ .Values.openrag.image.tag }}"
          command:
            - sh
            - -c
            - |
              echo "Waiting for Python env in /app/.venv..."
              while [ ! -f /app/.venv/.ready ]; do
                sleep 3
              done
              echo "Venv is ready."
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-env
          volumeMounts:
            - name: venv
              mountPath: /app/.venv
      containers:
        - name: openrag
          image: "{{ .Values.openrag.image.repository }}:{{ .Values.openrag.image.tag }}"
          securityContext:
            {{- toYaml .Values.openrag.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.openrag.service.port }}
          resources:
            {{- toYaml .Values.openrag.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health_check
              port: {{ .Values.openrag.service.port }}
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health_check
              port: {{ .Values.openrag.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health_check
              port: {{ .Values.openrag.service.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-env
            - secretRef:
                name: {{ include "openrag-stack.secretName" . }}
          volumeMounts:
            - name: model-weights
              mountPath: /app/model_weights
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
            - name: venv
              mountPath: /app/.venv
            - name: egg-info
              mountPath: /app/openrag.egg-info
      volumes:
        - name: model-weights
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-model-weights
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
        - name: logs
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-logs
        - name: venv
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-venv
        - name: egg-info
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-openrag
  labels:
    app.kubernetes.io/name: openrag
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    app.kubernetes.io/name: openrag
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - protocol: TCP
      port: {{ .Values.openrag.service.port }}
      targetPort: {{ .Values.openrag.service.port }}
  type: {{ .Values.openrag.service.type }}
