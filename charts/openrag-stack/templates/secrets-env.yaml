{{- $secretName := include "openrag-stack.secretName" . }}
{{- $type := .Values.env.secretsProvider.type | default "values" }}
{{- if not .Values.env.existingSecret }}

{{- if eq $type "values" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels: {{- include "openrag-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $key, $value := .Values.env.secrets }}
  {{ $key }}: {{ $value | quote }}
{{- end }}

{{- else if eq $type "externalSecret" }}
---
# Requires External Secrets Operator >= 0.14 (first release that serves external-secrets.io/v1).
# On older installs only v1beta1 is available — pin apiVersion accordingly or upgrade the operator.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $secretName }}
  labels: {{- include "openrag-stack.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.env.secretsProvider.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.env.secretsProvider.externalSecret.secretStore.name | quote }}
    kind: {{ .Values.env.secretsProvider.externalSecret.secretStore.kind | quote }}
  target:
    name: {{ $secretName }}
    creationPolicy: Owner
  {{- if .Values.env.secretsProvider.externalSecret.dataFrom }}
  dataFrom:
    {{- toYaml .Values.env.secretsProvider.externalSecret.dataFrom | nindent 4 }}
  {{- else if .Values.env.secretsProvider.externalSecret.data }}
  data:
    {{- toYaml .Values.env.secretsProvider.externalSecret.data | nindent 4 }}
  {{- else }}
  {{- fail "externalSecret requires either dataFrom or data to be set" }}
  {{- end }}

{{- else if eq $type "vaultStaticSecret" }}
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ $secretName }}
  labels: {{- include "openrag-stack.labels" . | nindent 4 }}
spec:
  type: {{ .Values.env.secretsProvider.vaultStaticSecret.type | quote }}
  mount: {{ .Values.env.secretsProvider.vaultStaticSecret.mount | quote }}
  path: {{ .Values.env.secretsProvider.vaultStaticSecret.path | quote }}
  {{- if .Values.env.secretsProvider.vaultStaticSecret.vaultAuthRef }}
  vaultAuthRef: {{ .Values.env.secretsProvider.vaultStaticSecret.vaultAuthRef | quote }}
  {{- end }}
  refreshAfter: {{ .Values.env.secretsProvider.vaultStaticSecret.refreshAfter | quote }}
  hmacSecretData: {{ .Values.env.secretsProvider.vaultStaticSecret.hmacSecretData }}
  destination:
    create: true
    name: {{ $secretName }}
  rolloutRestartTargets:
    - kind: Deployment
      name: {{ include "openrag-stack.fullname" . }}-openrag
    {{- if .Values.indexerUi.enabled }}
    - kind: Deployment
      name: {{ include "openrag-stack.fullname" . }}-indexer-ui
    {{- end }}
    # Note: the Ray head and workers also mount this secret via secretRef but
    # VSO rolloutRestartTargets only supports Deployment/StatefulSet/DaemonSet —
    # RayCluster pods managed by KubeRay must be cycled manually after rotation.

{{- else }}
{{- fail (printf "invalid env.secretsProvider.type: %q (accepted values: values, externalSecret, vaultStaticSecret)" $type) }}
{{- end }}
{{- end }}
