apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-reranker
  labels:
    app.kubernetes.io/name: reranker
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.reranker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: reranker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reranker
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- if .Values.reranker.runtimeClassName }}
      runtimeClassName: {{ .Values.reranker.runtimeClassName }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      nodeSelector: {{- toYaml .Values.reranker.nodeSelector | nindent 8 }}
      containers:
        - name: reranker
          image: "{{ .Values.reranker.image.repository }}:{{ .Values.reranker.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false  # model cache writes to /app/.cache
          args:
            - "v2"
            - "--model-id"
            - "{{ .Values.reranker.model.id }}"
            - "--port"
            - "{{ .Values.reranker.service.port }}"
          ports:
            - containerPort: {{ .Values.reranker.service.port }}
          resources:
            {{- toYaml .Values.reranker.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.reranker.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.reranker.service.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: hf-cache
              mountPath: /app/.cache/huggingface
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-env
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-model-weights
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-reranker
  labels:
    app.kubernetes.io/name: reranker
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    app.kubernetes.io/name: reranker
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - protocol: TCP
      port: {{ .Values.reranker.service.port }}
      targetPort: {{ .Values.reranker.service.port }}
  type: {{ .Values.reranker.service.type }}
