services:
  mock-vllm:
    build:
      context: .
      dockerfile: Dockerfile.mock-vllm
    ports:
      - "8000:8000"
    networks:
      default:
        aliases:
          - vllm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  rdb:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=root_password
      - POSTGRES_USER=root
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      interval: 2s
      timeout: 5s
      retries: 10

  etcd:
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 10s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.6.11
    command: ["milvus", "run", "standalone"]
    security_opt:
    - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

  openrag:
    build:
      context: ../../..
      dockerfile: Dockerfile
    environment:
      - EMBEDDER_MODEL_NAME=mock-embedding-model
      - EMBEDDER_BASE_URL=http://vllm:8000/v1/
      - EMBEDDER_API_KEY=EMPTY
      - POSTGRES_HOST=rdb
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root_password
      - VDB_HOST=milvus
      - BASE_URL=http://vllm:8000/v1/
      - API_KEY=EMPTY
      - MODEL=mock-chat-model
      - VLM_BASE_URL=http://vllm:8000/v1/
      - VLM_API_KEY=EMPTY
      - VLM_MODEL=mock-vlm-model
      - RERANKER_ENABLED=false
      - WITH_CHAINLIT_UI=false
      - WITH_OPENAI_API=true
      - IMAGE_CAPTIONING=false
      - LOG_LEVEL=INFO
      - PDFLoader=PyMuPDFLoader
      - RAY_POOL_SIZE=1
      - RAY_ENABLE_UV_RUN_RUNTIME_ENV=0
      - RAY_memory_monitor_refresh_ms=0
      - PROMPTS_DIR=../prompts/example1
      - DEFAULT_FILE_QUOTA=10
      - AUTH_TOKEN=${AUTH_TOKEN:-test-admin-token}
      - SUPER_ADMIN_MODE=${SUPER_ADMIN_MODE:-true}
      # The API test suite issues bursts of requests; disable rate limiting so
      # it doesn't trip the limiter (the limiter is unit-tested separately).
      - RATE_LIMIT_ENABLED=false
    ports:
      - "8080:8080"
    volumes:
      - test_data:/app/data
    depends_on:
      mock-vllm:
        condition: service_healthy
      milvus:
        condition: service_healthy
      rdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health_check"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 60s

volumes:
  test_data: