include:
  - vdb/milvus.yaml
  - ${CHAINLIT_DATALAYER_COMPOSE:-extern/dummy.yaml}
  - extern/reranker/${RERANKER_PROVIDER:-infinity}.yaml
  - ${TRANSCRIBER_COMPOSE:-extern/dummy.yaml}

x-openrag: &openrag_template
  image: linagoraai/openrag:latest
  build:
    context: .
    dockerfile: Dockerfile
  extra_hosts:
    # Let containers reach services running on the Docker host via
    # ``host.docker.internal`` (Linux Docker >= 20.10). Useful when an OIDC
    # provider runs on the host in AUTH_MODE=oidc. If the IdP is behind a
    # custom hostname resolved only in the host's /etc/hosts, add your own
    # mapping via a ``docker-compose.override.yaml`` rather than editing this
    # list — otherwise real external domains with the same name would be
    # shadowed for other users.
    - "host.docker.internal:host-gateway"
  volumes:
    - ${DATA_VOLUME:-./data}:/app/data
    - ./i8n:/app/openrag/.chainlit/translations
    - ${MODEL_WEIGHTS_VOLUME:-~/.cache/huggingface}:/app/model_weights # Model weights for RAG
    - ./openrag:/app/openrag # For dev mode
    - /$SHARED_ENV:/ray_mount/.env # Shared environment variables
    - ./logs:/app/logs # For dev mode
  ports:
    - ${APP_PORT:-8080}:${APP_iPORT:-8080}
    # Bind the Ray dashboard to localhost only: it has no authentication and
    # its job-submission API allows arbitrary code execution on the cluster,
    # so it must never be reachable from outside the host.
    - 127.0.0.1:${RAY_DASHBOARD_PORT:-8265}:8265 # Disable when in cluster mode
    - ${CHAINLIT_PORT:-8090}:${CHAINLIT_PORT:-8090}
  networks:
    default:
      aliases:
        - openrag
  env_file:
    - ${SHARED_ENV:-.env}
  shm_size: 10.24gb

x-vllm-env: &vllm_env
  HUGGING_FACE_HUB_TOKEN:
  VLLM_SLEEP_WHEN_IDLE: 1  # Avoid 100% CPU usage when idle

x-vllm: &vllm_template
  networks:
    default:
      aliases:
        - vllm
  restart: on-failure
  environment:
    <<: *vllm_env
  ipc: "host"
  volumes:
    - ${VLLM_CACHE:-/root/.cache/huggingface}:/root/.cache/huggingface # put ./vllm_cache if you want to have the weights on the vllm_cache folder in your project
  command: >
    --model ${EMBEDDER_MODEL_NAME:-jinaai/jina-embeddings-v3}
    --trust-remote-code
    --task embed
    --gpu_memory_utilization 0.3
    --max-model-len ${MAX_MODEL_LEN:-8192}
  # --max-num-seqs 1
  # gpu_memory_utilization, max-num-seqs et max-model-len can be tuned depending on your GPU memory

  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    interval: 20s
    timeout: 5s
    retries: 4
    start_period: 90s
  # ports:
  #   - ${VLLM_PORT:-8000}:8000
services:
  # OpenRAG Indexer UI
  indexer-ui:
    image: linagoraai/indexer-ui:latest
    build:
      context: ./extern/indexer-ui
      dockerfile: Dockerfile
      args:
        # Mount indexer-ui under a subpath (e.g. /indexerui/) on a shared
        # vhost with the backend. Empty = root-level (default). See
        # docs/oidc.md §"Single vhost deployment" for the matching nginx
        # rules.
        BASE_PATH: ${INDEXERUI_BASE_PATH:-}
    environment:
      - API_BASE_URL=${API_BASE_URL:-http://localhost:${APP_PORT:-8080}}
      - INCLUDE_CREDENTIALS=${INCLUDE_CREDENTIALS:-false}
      - AUTH_MODE=${AUTH_MODE:-token}
      - DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-}
    ports:
      - "${INDEXERUI_PORT:-3042}:3000"
    restart: unless-stopped

  # GPU - default
  openrag:
    <<: *openrag_template
    runtime: nvidia
    environment:
     - NVIDIA_VISIBLE_DEVICES=all
     - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - ""
    depends_on:
      rdb:
        condition: service_started
      milvus:
        condition: service_healthy
      vllm-gpu:
        condition: service_healthy

  # No GPU
  openrag-cpu:
    <<: *openrag_template
    deploy: {}
    profiles:
      - "cpu"
    depends_on:
      rdb:
        condition: service_started
      milvus:
        condition: service_healthy
      vllm-cpu:
        condition: service_healthy

  rdb:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env}
      - POSTGRES_USER=${POSTGRES_USER:-root}
    volumes:
      - ${DB_VOLUME:-./db}:/var/lib/postgresql/data
    expose:
      - 5432

  vllm-gpu:
    <<: *vllm_template
    image: vllm/vllm-openai:v0.9.2
    environment:
      <<: *vllm_env
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - "" # Empty string gives default behavior (but does not run when cpu requested)

  vllm-cpu:
    <<: *vllm_template
    build:
      context: extern/vllm
      dockerfile: Dockerfile.cpu
      target: vllm-openai
    image: openrag-vllm-openai-cpu
    deploy: {}
    environment:
      <<: *vllm_env
      VLLM_CPU_KVCACHE_SPACE: 8
    # Default value isn't sufficient for full context length
    command: >
      --model ${EMBEDDER_MODEL_NAME:-jinaai/jina-embeddings-v3}
      --trust-remote-code
      --dtype float32
      --max-model-len ${MAX_MODEL_LEN:-8192}
    #  --max-num-batched-tokens 32768
    # dtype is required for aarch64 (https://github.com/vllm-project/vllm/issues/11327) and improves speed on amd64.
    # max-num-batched-tokens is required for aarch64 because chunked prefill isn't supported by V1 vllm backend
    # for aarch64 yet. On aarch64 max-num-batched-tokens must be equal max-model-len for now (without chunked prefill).
    # For details see https://github.com/vllm-project/vllm/issues/21179
    profiles:
      - "cpu"

